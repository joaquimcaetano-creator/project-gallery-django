<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mostra Virtual - UFJ{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #f8fafc;
            overflow-x: hidden;
        }

        #particles-js {
            position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1;
            background: radial-gradient(circle at top right, #1e293b 0%, #020617 100%);
        }

        .navbar { 
            background: rgba(2, 6, 23, 0.8) !important; 
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }

        /* Glassmorphism Container */
        .glass-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px;
            padding: 40px;
            margin-top: 30px;
            margin-bottom: 50px;
            color: #0f172a; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
        }

        .glass-container h1, .glass-container h2, .glass-container h3, .glass-container p {
            color: #0f172a !important;
        }

        .btn-modern {
            background: #2563eb;
            color: white !important;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            border: none;
        }
        .btn-modern:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.4); }

        /* === CORREÇÃO DEFINITIVA PARA MOBILE === */
        .navbar-toggler {
            border: none !important;
            box-shadow: none !important;
        }

        @media (max-width: 991.98px) {
            .navbar-collapse {
                background: white; 
                border-radius: 25px;
                padding: 20px;
                margin-top: 15px;
                box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            }
            .navbar-nav .nav-link {
                color: #0f172a !important; 
                padding: 15px;
                border-bottom: 1px solid #f1f5f9;
            }
            .navbar-nav .nav-link:last-child {
                border-bottom: none;
            }
        }

        /* Estilo da Logo UFJ */
        .logo-ufj {
            height: 45px;
            margin-right: 12px;
            /* O filtro abaixo deixa a logo colorida em tons de branco/prata para destacar no fundo escuro */
            filter: brightness(0) invert(1);
            transition: 0.3s;
        }
        .navbar-brand:hover .logo-ufj {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div id="particles-js"></div> 

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="{% url 'home' %}">
                <img src="https://ufj.edu.br/p/33924-identidade-visual/logo-ufj.png" alt="Logo UFJ" class="logo-ufj">
                <span class="d-none d-sm-inline">Mostra Virtual</span>
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="bi bi-list fs-1 text-white"></i>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto fw-semibold">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'projetos' %}">Projetos</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'pesquisas' %}">Pesquisas</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'agenda' %}">Agenda</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'sobre' %}">Sobre</a></li>
                    <li class="nav-item"><a class="nav-link text-primary fw-bold" href="/admin">Painel</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="glass-container" data-aos="fade-in">
            {% block content %}{% endblock %}
        </div>
    </div>

    <footer class="text-center py-5 text-secondary">
        <p class="small">© 2026 Mostra UFJ • Ciência da Computação</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <script>
        AOS.init({ duration: 1000, once: true });

        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 80 },
                "color": { "value": "#2563eb" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5 },
                "size": { "value": 3 },
                "line_linked": { "enable": true, "distance": 150, "color": "#2563eb", "opacity": 0.2, "width": 1 },
                "move": { "enable": true, "speed": 1.5 }
            },
            "interactivity": {
                "events": {
                    "onhover": { "enable": true, "mode": "repulse" }
                }
            }
        });
    </script>
</body>
</html>
