<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mostra Virtual - UFJ{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            color: #f8fafc; /* Texto padrão claro */
            background-color: #0f172a; 
            overflow-x: hidden;
        }

        #particles-js {
            position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1;
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
        }

        .navbar { 
            background-color: rgba(15, 23, 42, 0.9) !important; 
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); 
            padding: 1rem 0;
        }
        .navbar-brand { 
    font-weight: 800; 
    color: #f8fafc !important; 
    font-size: 1.5rem; 
    display: flex; 
    align-items: center; 
}
.nav-link { color: #cbd5e1 !important; font-weight: 600; margin-left: 15px; }

/* Estilo extra para a logo não ficar colada no texto */
.navbar-brand img {
    margin-right: 12px;
    border-radius: 8px; /* Deixa as bordinhas da logo redondas como os cards */
}

        /* --- LOGICA DE CORES (O PASSO A PASSO) --- */

        /* 1. Títulos GERAIS (como na página de Projetos) ficam BRANCOS */
        h1, h2, h3, .display-6 { color: #ffffff !important; }

        /* 2. Dentro da HERO-CONTAINER (Caixa da Home), tudo fica ESCURO */
        .hero-container {
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 40px; padding: 80px 40px; margin-top: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }
        .hero-container h1, 
        .hero-container p, 
        .hero-container .text-muted { 
            color: #0f172a !important; 
        }

        /* 3. Dentro dos CARDS (Projetos), o texto fica ESCURO */
        .card {
            border-radius: 24px !important; border: none; background: #ffffff;
            color: #1e293b !important; transition: all 0.4s ease;
        }
        .card h5, .card p { color: #1e293b !important; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px rgba(0,0,0,0.2) !important; }

        .btn-main {
            background: #0284c7; color: white; border-radius: 14px;
            padding: 14px 35px; font-weight: 700; border: none;
        }
    </style>
</head>
<body>
    <div id="particles-js"></div> 

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="{% url 'home' %}">
            <i class="bi bi-mortarboard-fill me-2 fs-3 text-info"></i>
            <span class="fw-bold">Mostra Virtual UFJ</span>
        </a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Início</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'projetos' %}">Projetos</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'sobre' %}">Sobre</a></li>
                <li class="nav-item"><a class="nav-link text-info fw-bold" href="/admin">Admin</a></li>
            </ul>
        </div>
    </div>
</nav>

    <div class="container pb-5 mt-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center py-4" style="color: #cbd5e1;">
        <p>© 2026 Mostra Virtual UFJ - Desenvolvido por Joaquim</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        particlesJS.load('particles-js', 'https://cdn.jsdelivr.net/npm/particles.js@2.0.0/demo/particles.json');
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
