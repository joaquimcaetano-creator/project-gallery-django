<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mostra Virtual - UFJ{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #f8fafc;
            overflow-x: hidden;
        }

        #particles-js {
            position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1;
            background: radial-gradient(circle at top right, #1e293b 0%, #020617 100%);
        }

        .navbar { 
            background: rgba(2, 6, 23, 0.8) !important; 
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* O segredo do visual moderno: Glassmorphism */
        .glass-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px;
            padding: 40px;
            margin-top: 30px;
            margin-bottom: 50px;
            color: #0f172a; /* Texto escuro dentro do branco */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Força títulos dentro do container branco a serem escuros */
        .glass-container h1, .glass-container h2, .glass-container h3, .glass-container p {
            color: #0f172a !important;
        }

        .btn-modern {
            background: #2563eb;
            color: white !important;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            border: none;
        }
        .btn-modern:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.4); }
    </style>
</head>
<body>
    <div id="particles-js"></div> 

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}">
                <i class="bi bi-rocket-takeoff-fill text-primary me-2"></i> Mostra Virtual
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto fw-semibold">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'projetos' %}">Projetos</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'agenda' %}">Agenda</a></li>
                    <li class="nav-item"><a class="nav-link text-primary" href="/admin">Painel</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="glass-container">
            {% block content %}{% endblock %}
        </div>
    </div>

    <footer class="text-center py-5 text-secondary">
        <p class="small">© 2026 Mostra UFJ • Ciência da Computação</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
        particlesJS.load('particles-js', 'https://cdn.jsdelivr.net/npm/particles.js@2.0.0/demo/particles.json');
    </script>
</body>
</html>
