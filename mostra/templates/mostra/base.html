{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Mostra Virtual - UFJ{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        /* --- RESET E SEGURANÇA CONTRA CORTES --- */
        html, body {
            overflow-x: hidden !important;
            width: 100%;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #f8fafc;
        }

        #particles-js {
            position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1;
            background: radial-gradient(circle at top right, #1e293b 0%, #020617 100%);
        }

        /* --- NAVBAR --- */
        .navbar { 
            background: rgba(2, 6, 23, 0.95) !important; 
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
            width: 100%;
            padding: 5px 0;
        }

        /* Logo Adjustment */
        .logo-ufj { height: 40px; margin-right: 10px; transition: 0.3s; }

        /* --- MENU MOBILE (SEM SANDUÍCHE, SEM CORTE, TUDO BRANCO) --- */
        @media (max-width: 991.98px) {
            .navbar-toggler { display: none !important; } /* Esconde o sanduíche */

            .navbar-collapse {
                display: flex !important;
                flex-basis: auto;
                justify-content: center;
                width: 100%;
            }

            .navbar-nav {
                flex-direction: row !important;
                display: flex !important;
                justify-content: center;
                flex-wrap: wrap; /* Se não couber em uma linha, pula pra baixo sem quebrar o site */
                width: 100%;
                padding: 5px 0 !important;
                gap: 2px;
            }

            .navbar-nav .nav-link {
                color: #ffffff !important; /* BRANCO PURO */
                font-weight: 800 !important;
                font-size: 0.62rem !important; /* Fonte pequena para caber tudo */
                text-transform: uppercase;
                padding: 5px 8px !important;
                white-space: nowrap;
                letter-spacing: 0.2px;
            }

            .logo-ufj { height: 32px; } /* Logo menor no mobile */
        }

        /* --- CONTAINER PRINCIPAL (GLASSMORPHISM) --- */
        .glass-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 35px;
            padding: 40px;
            margin-top: 25px;
            margin-bottom: 50px;
            color: #0f172a; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
            width: 92%; /* Mantém respiro nas laterais */
            margin-left: auto;
            margin-right: auto;
        }

        /* Cor do texto dentro do container branco */
        .glass-container h1, .glass-container h2, .glass-container h3, .glass-container p {
            color: #0f172a !important;
        }

        /* Força branco na seção azul "Pronto para começar" da home */
        .bg-primary h2, .bg-primary p { color: #ffffff !important; }

        /* Ajustes específicos para Celular (UX Feedback) */
        @media (max-width: 768px) {
            .glass-container {
                padding: 20px 15px !important;
                border-radius: 20px;
                width: 95%; /* Ocupa um pouco mais no celular */
            }
            .display-3 { font-size: 2rem !important; } /* Título da home menor */
        }

        /* Botões */
        .btn-modern {
            background: #2563eb;
            color: white !important;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            border: none;
        }
        .btn-modern:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(37, 99, 235, 0.3); }
    </style>
</head>
<body>
    <div id="particles-js"></div> 

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid px-3">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="{% url 'home' %}">
                <img src="{% static 'mostra/img/logo_ufj_branca.png' %}" alt="Logo UFJ" class="logo-ufj">
                <span class="d-none d-sm-inline">Mostra Virtual</span>
            </a>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'projetos' %}">Projetos</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'pesquisas' %}">Pesquisas</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'agenda' %}">Agenda</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'sobre' %}">Sobre</a></li>
                    <li class="nav-item"><a class="nav-link text-primary" href="/admin">Painel</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="glass-container" data-aos="fade-in">
            {% block content %}{% endblock %}
        </div>
    </div>

    <footer class="text-center py-4 text-secondary">
        <p class="small">© 2026 Mostra UFJ • Ciência da Computação</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <script>
        AOS.init({ duration: 800, once: true });

        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 50 },
                "color": { "value": "#2563eb" },
                "opacity": { "value": 0.3 },
                "size": { "value": 2 },
                "line_linked": { "enable": true, "distance": 150, "color": "#2563eb", "opacity": 0.1, "width": 1 },
                "move": { "enable": true, "speed": 1 }
            }
        });
    </script>
</body>
</html>
